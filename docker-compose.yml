version: '3.8'

services:
  # 1. Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      # - frontend
      - backend
    networks:
      - app-network

  # # 2. Frontend (React)
  # frontend:
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules # 호스트의 node_modules 덮어쓰기 방지
  #   command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
  #   networks:
  #     - app-network

  # 3. Backend Core (FastAPI via uv)
  backend:
    build:
      context: .
    volumes:
      - .:/app
    # uv run을 사용하여 uvicorn 실행
    command: uv run main.py
    env_file:
      - ./.env.secret
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # # 4. Background Worker (LLM 요청, 채팅 분석 처리용)
  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   volumes:
  #     - ./backend:/app
  #   # uv run을 사용하여 celery worker 실행
  #   command: uv run celery -A app.celery_app worker --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@postgres:5432/mydb
  #     - REDIS_URL=redis://redis:6379/0
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - app-network

  # # 5. Scheduler (2일에 1번 배치 처리 트리거용)
  # beat:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   volumes:
  #     - ./backend:/app
  #   # uv run을 사용하여 celery beat(스케줄러) 실행
  #   command: uv run celery -A app.celery_app beat --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@postgres:5432/mydb
  #     - REDIS_URL=redis://redis:6379/0
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - app-network

  # 6. Database (PostgreSQL)
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  # 7. In-Memory DB / Message Broker (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  pg_data:
  redis_data:

networks:
  app-network:
    driver: bridge