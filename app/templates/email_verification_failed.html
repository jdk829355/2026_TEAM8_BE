<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 실패</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; }
        .icon-circle { width: 80px; height: 80px; background-color: #fff5f5; color: #ff7675; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 24px; font-size: 40px; font-weight: bold; }
        h1 { color: #2d3436; font-size: 24px; margin-bottom: 12px; }
        p { color: #636e72; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; background-color: #2d3436; color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.3s; }
        .btn:hover { background-color: #000000; }
        .support { margin-top: 20px; font-size: 14px; color: #b2bec3; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-circle">!</div>
        <h1>인증에 실패했습니다</h1>
        <div class="support">문제가 지속되면 고객센터에 문의해주세요.</div>
    </div>
</body>
</html>
